<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>通用设置 | 一分钟科技</title>
    <meta name="description" content="语言、时区、默认入口和缓存策略配置。" />
    <link rel="stylesheet" href="/styles.css?v=32" />
  </head>
  <body class="site-body">
    <header class="system-header ref-settings-header">
      <a class="back-link" href="/">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4">
          <path d="m15 18-6-6 6-6"></path>
        </svg>
        <span data-i18n="shared.backHome">返回首页</span>
      </a>

      <div class="brand-label" style="margin-right: auto;">
        <strong data-i18n="shared.systemSettings">系统配置</strong>
        <span data-i18n="general.brand.subtitle">通用系统偏好中心</span>
      </div>

      <div class="locale-switch" aria-label="语言切换">
        <button type="button" class="is-active" data-locale="zh-CN">中文</button>
        <button type="button" data-locale="en">EN</button>
      </div>
    </header>

    <main class="system-page ref-settings-page">
      <div class="settings-shell ref-settings-shell">
        <aside class="settings-sidebar ref-settings-sidebar">
          <div class="settings-nav-group">
            <h3 data-i18n="settings.nav.group.ai">AI 模型</h3>
            <a class="settings-link" data-settings-path="/ai-settings" href="/ai-settings">
              <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path d="M12 2 4 6v12l8 4 8-4V6l-8-4Zm0 2.2 5.8 2.9L12 10 6.2 7.1 12 4.2Zm-6 4.7 5 2.5v6.4l-5-2.5V8.9Zm7 8.9v-6.4l5-2.5v6.4l-5 2.5Z" />
              </svg>
              <span data-i18n="settings.nav.modelConfig">模型配置</span>
            </a>
            <a class="settings-link" data-settings-path="/business-profile" href="/business-profile">
              <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path d="M4 5.75A2.75 2.75 0 0 1 6.75 3h10.5A2.75 2.75 0 0 1 20 5.75v12.5A2.75 2.75 0 0 1 17.25 21H6.75A2.75 2.75 0 0 1 4 18.25V5.75ZM6.75 5A.75.75 0 0 0 6 5.75v12.5c0 .41.34.75.75.75h10.5c.41 0 .75-.34.75-.75V5.75a.75.75 0 0 0-.75-.75H6.75ZM8 8h8v2H8V8Zm0 4h8v2H8v-2Zm0 4h5v2H8v-2Z" />
              </svg>
              <span data-i18n="settings.nav.businessProfile">业务资料</span>
            </a>
          </div>

          <div class="settings-nav-group">
            <h3 data-i18n="settings.nav.group.search">搜索引擎</h3>
            <a class="settings-link" data-settings-path="/crawler-settings" href="/crawler-settings">
              <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="6"></circle>
                <path d="m20 20-4.2-4.2"></path>
              </svg>
              <span data-i18n="settings.nav.searchApi">搜索 API</span>
            </a>
            <a class="settings-link" data-settings-path="/crawler-rules" href="/crawler-rules">
              <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path d="M12 3 4 7v5c0 5.25 3.44 10.23 8 11 4.56-.77 8-5.75 8-11V7l-8-4Z" />
              </svg>
              <span data-i18n="settings.nav.crawlerConfig">爬虫配置</span>
            </a>
          </div>

          <div class="settings-nav-group">
            <h3 data-i18n="settings.nav.group.mail">邮件服务</h3>
            <a class="settings-link" data-settings-path="/mail-settings" href="/mail-settings">
              <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path d="M3 6.75A2.75 2.75 0 0 1 5.75 4h12.5A2.75 2.75 0 0 1 21 6.75v10.5A2.75 2.75 0 0 1 18.25 20H5.75A2.75 2.75 0 0 1 3 17.25V6.75Zm2.14.43L12 12.02l6.86-4.84A1.24 1.24 0 0 0 17.88 6H6.12a1.24 1.24 0 0 0-.98 1.18Z" />
              </svg>
              <span data-i18n="settings.nav.mailConfig">邮箱配置</span>
            </a>
            <a class="settings-link" data-settings-path="/email-templates" href="/email-templates">
              <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path d="M4 4h16v4H4V4Zm0 6h16v10H4V10Zm3 2v6h4v-6H7Zm6 0v2h4v-2h-4Zm0 4v2h4v-2h-4Z" />
              </svg>
              <span data-i18n="settings.nav.emailTemplates">邮件模板</span>
            </a>
          </div>

          <div class="settings-nav-group">
            <h3 data-i18n="settings.nav.group.system">系统</h3>
            <a class="settings-link" data-settings-path="/general-settings" href="/general-settings">
              <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path d="M19.43 12.98 21.46 11.4a.65.65 0 0 0 .15-.82l-1.92-3.32a.65.65 0 0 0-.78-.29l-2.39.96a7.2 7.2 0 0 0-.83-.48l-.36-2.54a.66.66 0 0 0-.65-.55h-3.84a.66.66 0 0 0-.65.55l-.36 2.54c-.29.13-.56.29-.83.48l-2.39-.96a.65.65 0 0 0-.78.29L2.38 10.58a.65.65 0 0 0 .15.82l2.03 1.58-.04.48.04.48-2.03 1.58a.65.65 0 0 0-.15.82l1.92 3.32c.17.29.52.41.83.29l2.39-.96c.27.19.54.35.83.48l.36 2.54c.05.32.32.55.65.55h3.84c.33 0 .6-.23.65-.55l.36-2.54c.29-.13.56-.29.83-.48l2.39.96c.31.12.66 0 .83-.29l1.92-3.32a.65.65 0 0 0-.15-.82l-2.03-1.58.04-.48-.04-.48ZM12 15.5A3.5 3.5 0 1 1 12 8a3.5 3.5 0 0 1 0 7.5Z" />
              </svg>
              <span data-i18n="settings.nav.generalSettings">通用设置</span>
            </a>
          </div>
        </aside>

        <section class="settings-main ref-settings-main">
          <div class="settings-hero ref-settings-hero">
            <h1 data-i18n="general.hero.title">通用设置</h1>
            <p data-i18n="general.hero.copy">保存这里的配置后，界面语言、默认入口和本地缓存策略会同步影响其他模块。</p>
          </div>

          <form id="general-settings-form" class="settings-stack ref-settings-stack">
            <article class="setting-section ref-setting-panel">
              <div class="settings-section-head ref-setting-head">
                <div class="section-title-row">
                  <span class="section-icon">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                      <path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2Zm1 17.93V20h-2v-.07A8 8 0 0 1 4.07 13H4v-2h.07A8 8 0 0 1 11 4.07V4h2v.07A8 8 0 0 1 19.93 11H20v2h-.07A8 8 0 0 1 13 19.93ZM12 7a1 1 0 0 0-1 1v4.59l2.7 2.7 1.41-1.41L13 11.76V8a1 1 0 0 0-1-1Z" />
                    </svg>
                  </span>
                  <div>
                    <h2 class="settings-section-title" data-i18n="general.section.region.title">区域与时间</h2>
                    <p class="summary-copy" data-i18n="general.section.region.copy">统一语言、时区和日期格式。</p>
                  </div>
                </div>
              </div>
              <div class="setting-body">
                <div class="setting-field-grid">
                  <label class="input-group">
                    <span data-i18n="general.field.language">界面语言</span>
                    <select class="select-input" id="general-language">
                      <option value="zh-CN">中文</option>
                      <option value="en">English</option>
                    </select>
                  </label>
                  <label class="input-group">
                    <span data-i18n="general.field.timezone">时区</span>
                    <select class="select-input" id="general-timezone">
                      <option value="Asia/Shanghai">Asia/Shanghai</option>
                      <option value="Europe/Berlin">Europe/Berlin</option>
                      <option value="America/New_York">America/New_York</option>
                    </select>
                  </label>
                  <label class="input-group">
                    <span data-i18n="general.field.dateFormat">日期格式</span>
                    <select class="select-input" id="general-date-format">
                      <option value="YYYY-MM-DD">YYYY-MM-DD</option>
                      <option value="DD/MM/YYYY">DD/MM/YYYY</option>
                      <option value="MM/DD/YYYY">MM/DD/YYYY</option>
                    </select>
                  </label>
                  <label class="input-group">
                    <span data-i18n="general.field.numberFormat">数字格式</span>
                    <select class="select-input" id="general-number-format">
                      <option value="1,234.56">1,234.56</option>
                      <option value="1.234,56">1.234,56</option>
                    </select>
                  </label>
                </div>
              </div>
            </article>

            <article class="setting-section ref-setting-panel">
              <div class="settings-section-head ref-setting-head">
                <div class="section-title-row">
                  <span class="section-icon">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                      <path d="M4 4h16v4H4zm0 6h16v10H4zm3 2h4v6H7z" />
                    </svg>
                  </span>
                  <div>
                    <h2 class="settings-section-title" data-i18n="general.section.prefs.title">工作台偏好</h2>
                    <p class="summary-copy" data-i18n="general.section.prefs.copy">控制默认入口和缓存/审核行为。</p>
                  </div>
                </div>
              </div>
              <div class="setting-body">
                <div class="setting-field-grid">
                  <label class="input-group">
                    <span data-i18n="general.field.defaultLanding">默认入口</span>
                    <select class="select-input" id="general-default-landing-page">
                      <option value="/customer-search" data-i18n="general.landing.search">客户搜索</option>
                      <option value="/ai-outreach" data-i18n="general.landing.outreach">开发信</option>
                    </select>
                  </label>
                  <label class="input-group">
                    <span data-i18n="general.field.logRetention">日志保留天数</span>
                    <input class="text-input" id="general-log-retention-days" type="number" min="1" value="30" />
                  </label>
                  <label class="input-group">
                    <span data-i18n="general.field.localCache">本地缓存</span>
                    <select class="select-input" id="general-local-cache-enabled">
                      <option value="true" data-i18n="general.toggle.on">开启</option>
                      <option value="false" data-i18n="general.toggle.off">关闭</option>
                    </select>
                  </label>
                  <label class="input-group">
                    <span data-i18n="general.field.autoSelect">默认全选客户</span>
                    <select class="select-input" id="general-auto-select-leads">
                      <option value="true" data-i18n="general.yesno.yes">是</option>
                      <option value="false" data-i18n="general.yesno.no">否</option>
                    </select>
                  </label>
                  <label class="input-group">
                    <span data-i18n="general.field.requireReview">发送前必须人工审核</span>
                    <select class="select-input" id="general-require-review-before-send">
                      <option value="true" data-i18n="general.yesno.yes">是</option>
                      <option value="false" data-i18n="general.yesno.no">否</option>
                    </select>
                  </label>
                  <label class="input-group">
                    <span data-i18n="general.field.debugMode">调试模式</span>
                    <select class="select-input" id="general-debug-mode">
                      <option value="false" data-i18n="general.toggle.off">关闭</option>
                      <option value="true" data-i18n="general.toggle.on">开启</option>
                    </select>
                  </label>
                </div>
              </div>
              <div class="footer-actions right">
                <div id="general-settings-result" class="helper-note"></div>
                <button class="action-button orange" type="submit" data-i18n="settings.btn.save">保存配置</button>
              </div>
            </article>
          </form>
        </section>
      </div>
    </main>
