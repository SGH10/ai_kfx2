      <div class="nav-actions">
        <div class="locale-switch" aria-label="Language Switch">
          <button type="button" class="is-active" data-locale="zh-CN">中文</button>

        <a class="icon-button" href="/ai-settings" title="AI Settings">

    </header>

    <main class="workspace-page outreach-workspace-ref">
      <div class="outreach-editor-layout">
        <aside class="outreach-left-column outreach-side-rail">
          <section class="outreach-side-card outreach-rail-section">
            <div class="outreach-mini-title">
              <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path d="M16 11c1.66 0 2.99-1.57 2.99-3.5S17.66 4 16 4s-3 1.57-3 3.5 1.34 3.5 3 3.5ZM8 11c1.66 0 2.99-1.57 2.99-3.5S9.66 4 8 4 5 5.57 5 7.5 6.34 11 8 11Zm0 2c-2.33 0-7 1.17-7 3.5V20h14v-3.5C15 14.17 10.33 13 8 13Zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.96 1.97 3.45V20h6v-3.5c0-2.33-4.67-3.5-7-3.5Z" />
              </svg>
              <strong data-i18n="outreach.section.targetCustomers">目标客户</strong>
            </div>

            <div class="outreach-inline-actions">
              <button id="search-import-button" class="action-button ghost" type="button" data-i18n="outreach.button.searchImport">搜索导入</button>
              <button id="manual-entry-button" class="action-button ghost" type="button" data-i18n="outreach.button.manualEntry">手动输入</button>
            </div>

            <div id="recipient-list" class="outreach-empty-recipient">
              <span class="empty-icon" aria-hidden="true">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                  <path d="M16 11c1.66 0 2.99-1.57 2.99-3.5S17.66 4 16 4s-3 1.57-3 3.5 1.34 3.5 3 3.5ZM8 11c1.66 0 2.99-1.57 2.99-3.5S9.66 4 8 4 5 5.57 5 7.5 6.34 11 8 11Zm0 2c-2.33 0-7 1.17-7 3.5V20h14v-3.5C15 14.17 10.33 13 8 13Zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.96 1.97 3.45V20h6v-3.5c0-2.33-4.67-3.5-7-3.5Z" />
                </svg>
              </span>
              <h3 data-i18n="outreach.empty.noCustomerTitle">暂无客户</h3>
              <p data-i18n="outreach.empty.noCustomerCopy">从客户搜索系统导入，或手动输入</p>
            </div>
          </section>

          <section class="outreach-side-card outreach-rail-section">
            <div class="outreach-mini-title">
              <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path d="M4 6h16v2H4zm0 5h16v2H4zm0 5h10v2H4z" />
              </svg>
              <strong data-i18n="outreach.section.productInfo">产品信息</strong>
            </div>

            <div class="form-stack">
              <label class="input-group">
                <span data-i18n="outreach.field.productName">产品名称 *</span>
                <input id="sidebar-product-name" class="text-input" type="text" data-i18n-placeholder="outreach.placeholder.productName" />
              </label>
              <label class="input-group">
                <span data-i18n="outreach.field.productKeywords">产品关键词 *</span>
                <input id="sidebar-product-keywords" class="text-input" type="text" data-i18n-placeholder="outreach.placeholder.productKeywords" />
              </label>
              <label class="input-group">
                <span data-i18n="outreach.field.valueProposition">产品优势</span>
                <textarea id="sidebar-value-proposition" class="textarea-input" rows="5" data-i18n-placeholder="outreach.placeholder.valueProposition"></textarea>
              </label>
            </div>
          </section>

          <section class="outreach-side-card outreach-rail-section outreach-rail-tail">
            <div class="outreach-mini-title">
              <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2Zm5.75 9H13V6.25A8 8 0 0 1 17.75 11ZM11 6.25V11H6.25A8 8 0 0 1 11 6.25ZM6.25 13H11v4.75A8 8 0 0 1 6.25 13ZM13 17.75V13h4.75A8 8 0 0 1 13 17.75Z" />
              </svg>
              <strong data-i18n="outreach.section.targetLanguage">目标语言</strong>
            </div>

            <div class="language-pill-grid">
              <button type="button" class="language-pill is-selected" data-language="zh-CN" data-i18n="lang.zh-CN">中文</button>
              <button type="button" class="language-pill" data-language="en" data-i18n="lang.en">英语</button>
              <button type="button" class="language-pill" data-language="ar" data-i18n="lang.ar">阿拉伯语</button>
              <button type="button" class="language-pill" data-language="fr" data-i18n="lang.fr">法语</button>
              <button type="button" class="language-pill" data-language="es" data-i18n="lang.es">西班牙语</button>
              <button type="button" class="language-pill" data-language="ru" data-i18n="lang.ru">俄语</button>
              <button type="button" class="language-pill" data-language="de" data-i18n="lang.de">德语</button>
              <button type="button" class="language-pill" data-language="pt" data-i18n="lang.pt">葡萄牙语</button>
            </div>

            <div class="selected-template-summary" aria-live="polite">
              <span class="empty-icon" aria-hidden="true">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                  <path d="M5.75 3A2.75 2.75 0 0 0 3 5.75v12.5A2.75 2.75 0 0 0 5.75 21h12.5A2.75 2.75 0 0 0 21 18.25V8.9a2.75 2.75 0 0 0-.8-1.94L16.04 3.8A2.75 2.75 0 0 0 14.1 3H5.75Zm.75 5.5h7v1.8h-7V8.5Zm0 4h11v1.8h-11v-1.8Zm0 4h8v1.8h-8v-1.8Z" />
                </svg>
              </span>
              <div class="selected-template-copy">
                <span data-i18n="outreach.section.selectedTemplate">已选择模板</span>
                <strong id="selected-template-name" data-i18n="outreach.template.defaultName">默认模板</strong>
                <p id="selected-template-meta" class="selected-template-meta"></p>
              </div>
              <label class="input-group template-selector-row">
                <span data-i18n="outreach.field.template">邮件模板</span>
                <select id="template-selector" class="select-input"></select>
              </label>
              <div class="selected-template-actions">
                <a class="action-button ghost section-action-button" href="/email-templates" data-i18n="outreach.button.manageTemplates">管理模板</a>
              </div>
            </div>
          </section>
        </aside>

        <section class="outreach-right-column">
          <article class="editor-panel outreach-main-editor ref-dev-editor">
            <div class="editor-panel-head">
              <div class="editor-toolbar">
                <div class="section-title-row">
                  <span class="section-icon">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                      <path d="M3 6.75A2.75 2.75 0 0 1 5.75 4h12.5A2.75 2.75 0 0 1 21 6.75v10.5A2.75 2.75 0 0 1 18.25 20H5.75A2.75 2.75 0 0 1 3 17.25V6.75Zm2.14.43L12 12.02l6.86-4.84A1.24 1.24 0 0 0 17.88 6H6.12a1.24 1.24 0 0 0-.98 1.18Z" />
                    </svg>
                  </span>
                  <div>
                    <h2 data-i18n="outreach.section.editor">开发信编辑</h2>
                  </div>
                </div>
                <div class="topbar-actions">
                  <button id="optimize-draft" class="action-button ghost" type="button" data-i18n="outreach.button.optimize">AI优化</button>
                  <a class="action-button ghost" href="/email-templates" data-i18n="outreach.button.manageTemplates">管理模板</a>
                  <button class="action-button ghost" type="button" data-i18n="outreach.button.sendTop">发送</button>
                </div>
              </div>
            </div>

            <div class="editor-panel-body ref-dev-body">
              <form id="compose-form" class="form-stack">
                <div class="ref-editor-top-row">
                  <label class="input-group">
                    <span data-i18n="outreach.field.recipient">收件人：</span>
                    <input id="recipient-email-preview" class="text-input" type="text" value="contact@example.com" readonly />
                  </label>
                  <label class="input-group">
                    <span data-i18n="outreach.field.language">语言：</span>
                    <select id="compose-language" class="select-input" name="language">
                      <option value="zh-CN" data-i18n="lang.zh-CN">中文</option>
                      <option value="en" data-i18n="lang.en">英语</option>
                      <option value="de" data-i18n="lang.de">德语</option>
                      <option value="fr" data-i18n="lang.fr">法语</option>
                      <option value="es" data-i18n="lang.es">西班牙语</option>
                      <option value="ru" data-i18n="lang.ru">俄语</option>
                      <option value="ar" data-i18n="lang.ar">阿拉伯语</option>
                      <option value="pt" data-i18n="lang.pt">葡萄牙语</option>
                    </select>
                  </label>
                  <button id="translate-email" class="action-button ghost" type="button" data-i18n="outreach.button.translate">翻译邮件</button>
                </div>

                <label class="input-group">
                  <span data-i18n="outreach.field.subject">主题：</span>
                  <input id="draft-subject" class="text-input" type="text" value="" data-i18n-placeholder="outreach.placeholder.subject" />
                </label>

                <div class="ref-mail-body-shell">
                  <div class="ref-mail-body-empty">
                    <span class="empty-icon" aria-hidden="true">
                      <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                        <path d="M3 6.75A2.75 2.75 0 0 1 5.75 4h12.5A2.75 2.75 0 0 1 21 6.75v10.5A2.75 2.75 0 0 1 18.25 20H5.75A2.75 2.75 0 0 1 3 17.25V6.75Zm2.14.43L12 12.02l6.86-4.84A1.24 1.24 0 0 0 17.88 6H6.12a1.24 1.24 0 0 0-.98 1.18Z" />
                      </svg>
                    </span>
                    <h3 data-i18n="outreach.empty.draftTitle">开始生成开发信</h3>
                    <p data-i18n="outreach.empty.draftCopy">在左侧配置客户信息和产品详情，点击“AI生成开发信”按钮</p>
                  </div>
                  <textarea id="draft-body" class="textarea-input ref-mail-body-textarea" rows="16"></textarea>
                </div>

                <div class="outreach-hidden-form-values">
                  <input id="hidden-company-name" class="text-input" type="hidden" name="companyName" value="一分钟科技" />
                  <input id="hidden-product-name" class="text-input" type="hidden" name="productName" value="AI 外贸获客工作流" />
                  <textarea id="hidden-value-proposition" class="textarea-input" name="valueProposition" rows="1" hidden>我们帮助外贸团队把客户搜索、开发信生成和批量触达放到同一套工作流里，减少人工整理时间并提升回复率。</textarea>
                  <select class="select-input" name="tone" hidden>
                    <option value="professional" selected>专业稳重</option>
                  </select>
                  <textarea id="hidden-call-to-action" class="textarea-input" name="callToAction" rows="1" hidden>如果方便的话，我们可以约 15 分钟简单聊一下，看看这套工作流是否适合你的团队。</textarea>
                  <input id="hidden-sender-name" class="text-input" type="hidden" name="senderName" value="Zijian" />
                  <input id="hidden-sender-email" class="text-input" type="hidden" name="senderEmail" value="zijian@example.com" />
                </div>

                <div id="send-result" class="helper-note"></div>

                <div class="topbar-actions ref-primary-actions">
                  <button id="generate-draft" class="action-button orange" type="submit" data-i18n="outreach.button.generate">AI生成开发信</button>
                  <button id="send-email" class="action-button green" type="button" disabled data-i18n="outreach.button.sendSelected">发送给已选客户</button>
                </div>
              </form>
            </div>
          </article>

          <div id="analysis-text" class="is-hidden"></div>
          <ul id="follow-up-list" class="is-hidden"></ul>
        </section>
      </div>
    </main>

    <div id="manual-customer-modal" class="manual-modal is-hidden" aria-hidden="true">
      <div class="manual-modal-card">
        <div class="manual-modal-head">
          <h3 data-i18n="outreach.modal.manualTitle">手动输入客户</h3>
          <button id="manual-customer-close" class="action-button ghost manual-modal-close" type="button" data-i18n="outreach.button.close">关闭</button>

        <form id="manual-customer-form" class="form-stack">
          <label class="input-group">
            <span data-i18n="outreach.field.companyName">公司名称 *</span>
            <input id="manual-company-name" class="text-input" type="text" data-i18n-placeholder="outreach.placeholder.manualCompany" required />
          </label>
          <label class="input-group">
            <span data-i18n="outreach.field.contactName">联系人</span>
            <input id="manual-contact-name" class="text-input" type="text" data-i18n-placeholder="outreach.placeholder.manualContact" />
          </label>
          <label class="input-group">
            <span data-i18n="outreach.field.email">邮箱 *</span>
            <input id="manual-email" class="text-input" type="email" data-i18n-placeholder="outreach.placeholder.manualEmail" required />
          </label>
          <label class="input-group">
            <span data-i18n="outreach.field.country">国家/地区</span>
            <input id="manual-country" class="text-input" type="text" data-i18n-placeholder="outreach.placeholder.manualCountry" />
          </label>
          <label class="input-group">
            <span data-i18n="outreach.field.website">官网</span>
            <input id="manual-website" class="text-input" type="text" data-i18n-placeholder="outreach.placeholder.manualWebsite" />
          </label>
          <div class="topbar-actions">
            <button class="action-button orange" type="submit" data-i18n="outreach.button.addCustomer">添加客户</button>
          </div>
        </form>
      </div>
    </div>
